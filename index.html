.bottom {

.footer {

    <div class="rule"></div>
    <div class="footer">building a better future together</div>
  </div>
</div>

<script>
const SHEET_ID = "1GUM_1Vyz5PZALAH8HgOQ8Fctln7FBI28dQuZ5vyxCSM";
const SHEET_NAME = "Sheet1";
const CELL = "A1";

function handleSheetData(data) {
  try {
   const value = data.table.rows[0].c[0].f || data.table.rows[0].c[0].v;
    const counter = document.getElementById("counter");

    if (value === null || value === undefined || isNaN(Number(value))) {
      counter.innerText = "ERR";
      return;
    }

    const diff = Number(value);
    counter.innerText = diff;

    if (diff >= 30) {
      counter.style.color = "var(--green)";
    } else if (diff >= 10) {
      counter.style.color = "var(--amber)";
    } else {
      counter.style.color = "var(--red)";
    }
  } catch (err) {
    console.error(err);
    document.getElementById("counter").innerText = "ERR";
  }
}

function update() {
  const oldScript = document.getElementById("sheet-script");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "sheet-script";
  script.src =
    "https://docs.google.com/spreadsheets/d/" +
    SHEET_ID +
    "/gviz/tq?sheet=" +
    encodeURIComponent(SHEET_NAME) +
    "&range=" +
    encodeURIComponent(CELL) +
    "&tqx=responseHandler:handleSheetData&cacheBust=" +
    Date.now();

  document.body.appendChild(script);
}

update();
setInterval(update, 60000);
</script>


</body>
</html>
